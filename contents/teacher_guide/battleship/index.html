<!DOCTYPE html>
<html>
  <head>
    <title>Simple Battleship</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main id="app">
      <h1>Simple Battleship</h1>

      <section id="statusPanel">
        <p id="message">Click a square on the computer board to fire.</p>
      </section>

      <section id="scorePanel">
        <p>Player Hits: <span id="playerHits">0</span></p>
        <p>Player Misses: <span id="playerMisses">0</span></p>
        <p>Computer Hits: <span id="computerHits">0</span></p>
        <p>Computer Misses: <span id="computerMisses">0</span></p>
      </section>

      <section id="boardsPanel">
        <div class="boardArea">
          <h2>Your Board</h2>
          <div id="playerBoard"></div>
        </div>

        <div class="boardArea">
          <h2>Computer Board</h2>
          <div id="computerBoard"></div>
        </div>
      </section>

      <section id="controls">
        <button id="newGameBtn">New Game</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
